<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitacion NorthPay</title>
</head>
<body style="margin:0;padding:0;background:#0c1609;font-family:Consolas,Monaco,monospace;color:#dae6d0;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;border:1px solid #3c4b35;background:#182214;">
          <tr>
            <td style="padding:24px;border-bottom:1px solid #3c4b35;">
              <h1 style="margin:0;font-size:22px;letter-spacing:2px;color:#f0ffe4;">NORTHPAY</h1>
              <p style="margin:8px 0 0 0;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#baccaf;">invitacion de registro</p>
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <p style="margin:0 0 12px 0;line-height:1.7;">Hola,</p>
               <p style="margin:0 0 12px 0;line-height:1.7;">
                 {{INVITER_NAME}} te invitó a completar tu onboarding en NorthPay.
               </p>
               <p style="margin:0 0 16px 0;line-height:1.7;">Usa el siguiente enlace para comenzar tu proceso de alta:</p>
              <p style="margin:0 0 24px 0;">
                <a href="{{REGISTRATION_LINK}}" style="display:inline-block;padding:10px 16px;border:1px solid #42ff00;background:#42ff00;color:#083900;text-decoration:none;font-weight:700;letter-spacing:1px;text-transform:uppercase;">Comenzar Onboarding</a>
              </p>
              <p style="margin:0 0 8px 0;font-size:12px;color:#baccaf;line-height:1.7;">este enlace expira en 48 horas.</p>
              <p style="margin:0;font-size:12px;color:#3c4b35;line-height:1.7;">si no solicitaste esta invitacion, ignora este correo.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
