<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuenta aprobada NorthPay</title>
</head>
<body style="margin:0;padding:0;background:#0c1609;font-family:Consolas,Monaco,monospace;color:#dae6d0;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;border:1px solid #3c4b35;background:#182214;">
          <tr>
            <td style="padding:24px;border-bottom:1px solid #3c4b35;">
              <h1 style="margin:0;font-size:22px;letter-spacing:2px;color:#f0ffe4;">NORTHPAY</h1>
              <p style="margin:8px 0 0 0;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#baccaf;">cuenta aprobada</p>
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <p style="margin:0 0 12px 0;line-height:1.7;">Hola {{USER_NAME}},</p>
              <p style="margin:0 0 12px 0;line-height:1.7;">tu documentacion fue aprobada y ya puedes activar tu cuenta.</p>
              <p style="margin:0 0 16px 0;line-height:1.7;">Configura tu contrasena usando este enlace:</p>
              <p style="margin:0 0 24px 0;">
                <a href="{{SET_PASSWORD_LINK}}" style="display:inline-block;padding:10px 16px;border:1px solid #42ff00;background:#42ff00;color:#083900;text-decoration:none;font-weight:700;letter-spacing:1px;text-transform:uppercase;">Configurar contrasena</a>
              </p>
              <p style="margin:0 0 8px 0;font-size:12px;color:#baccaf;line-height:1.7;">este enlace expira en 72 horas y solo puede usarse una vez.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
