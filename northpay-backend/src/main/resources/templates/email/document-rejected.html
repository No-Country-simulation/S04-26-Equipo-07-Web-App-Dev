<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Documento rechazado NorthPay</title>
</head>
<body style="margin:0;padding:0;background:#0c1609;font-family:Consolas,Monaco,monospace;color:#dae6d0;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;border:1px solid #3c4b35;background:#182214;">
          <tr>
            <td style="padding:24px;border-bottom:1px solid #3c4b35;">
              <h1 style="margin:0;font-size:22px;letter-spacing:2px;color:#f0ffe4;">NORTHPAY</h1>
              <p style="margin:8px 0 0 0;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#baccaf;">documento con observaciones</p>
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <p style="margin:0 0 12px 0;line-height:1.7;">Hola {{USER_NAME}},</p>
              <p style="margin:0 0 12px 0;line-height:1.7;">el documento <strong>{{DOCUMENT_KEY}}</strong> requiere correccion.</p>
              <p style="margin:0 0 6px 0;line-height:1.7;color:#ffb4ab;">observacion:</p>
              <p style="margin:0 0 16px 0;line-height:1.7;background:#232d1e;border:1px solid #3c4b35;padding:10px;">{{OBSERVATION}}</p>
              <p style="margin:0;font-size:12px;color:#baccaf;line-height:1.7;">ingresa al portal para subir la version corregida.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
